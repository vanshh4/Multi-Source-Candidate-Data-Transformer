version: '1.0'
output:
  name: default_projection
  fields:
  - output_name: candidate_id
    path: candidate_id
    type: string
    missing: error
    normalization:
    - trim
    description: Stable candidate identifier.
  - output_name: full_name
    path: full_name
    type: string
    missing: 'null'
    normalization:
    - trim
    - collapse_spaces
    - title_case
    description: Candidate full name.
  - output_name: emails
    path: emails
    type: array
    missing: 'null'
    normalization:
    - email_lowercase
    - sorted_unique
    description: Lowercase deduplicated email addresses.
  - output_name: phones
    path: phones
    type: array
    missing: 'null'
    normalization:
    - e164_phone
    - sorted_unique
    description: Phone numbers normalized to E.164 where possible.
  - output_name: location
    path: location
    type: object
    missing: 'null'
    description: Structured location object containing city, region, country, and raw text.
  - output_name: links
    path: links
    type: object
    missing: 'null'
    normalization:
    - https_url
    description: Candidate links such as LinkedIn, GitHub, portfolio, and other URLs.
  - output_name: headline
    path: headline
    type: string
    missing: 'null'
    normalization:
    - trim
    - collapse_spaces
    description: Short professional headline.
  - output_name: years_experience
    path: years_experience
    type: number
    missing: 'null'
    normalization: round_1_decimal
    description: Total years of professional experience.
  - output_name: skills
    path: skills
    type: array
    missing: 'null'
    normalization:
    - skill_canonical
    - sorted_unique
    description: Canonical skill objects with confidence and source references.
  - output_name: experience
    path: experience
    type: array
    missing: 'null'
    description: Normalized employment or project experience entries.
  - output_name: education
    path: education
    type: array
    missing: 'null'
    description: Normalized education entries.
  - output_name: overall_confidence
    path: overall_confidence
    type: number
    missing: 'null'
    normalization: round_2_decimal
    description: Weighted confidence score for the complete canonical candidate profile.
options:
  include_provenance: true
  include_confidence: true
  missing_default: 'null'
  validation_mode: strict
  additional_output_properties: false
