version: '1.0'
output:
  name: client_custom_schema
  fields:
  - output_name: external_candidate_key
    path: candidate_id
    type: string
    missing: error
    required: true
    normalization: trim
    description: Client-facing candidate key mapped from canonical candidate_id.
  - output_name: candidate_name
    path: full_name
    type: string
    missing: error
    required: true
    normalization:
    - trim
    - collapse_spaces
    - title_case
    description: Required display name for client export.
  - output_name: primary_emails
    path: emails
    type: array
    missing: error
    required: true
    normalization:
    - email_lowercase
    - sorted_unique
    description: Required email list for client matching.
  - output_name: mobile_numbers
    path: phones
    type: array
    missing: 'null'
    normalization:
    - e164_phone
    - sorted_unique
    description: Normalized candidate phone numbers.
  - output_name: current_city
    path: location.city
    type: string
    missing: 'null'
    normalization:
    - trim
    - collapse_spaces
    - title_case
    description: Current city from canonical location.
  - output_name: current_region
    path: location.region
    type: string
    missing: 'null'
    normalization:
    - trim
    - collapse_spaces
    - title_case
    description: Current state/region from canonical location.
  - output_name: country_code
    path: location.country
    type: string
    missing: 'null'
    normalization: iso_country_alpha2
    description: ISO-3166 alpha-2 country code.
  - output_name: linkedin_url
    path: links.linkedin
    type: string
    missing: omit
    normalization: https_url
    description: LinkedIn URL renamed for client schema.
  - output_name: github_url
    path: links.github
    type: string
    missing: omit
    normalization: https_url
    description: GitHub URL renamed for client schema.
  - output_name: profile_summary
    path: headline
    type: string
    missing: 'null'
    normalization:
    - trim
    - collapse_spaces
    description: Client-facing profile summary/headline.
  - output_name: total_experience_years
    path: years_experience
    type: number
    missing: 'null'
    normalization: round_1_decimal
    description: Total experience in years.
  - output_name: skill_set
    path: skills
    type: array
    missing: 'null'
    normalization:
    - skill_canonical
    - sorted_unique
    description: Canonical skills renamed as skill_set.
  - output_name: work_history
    path: experience
    type: array
    missing: 'null'
    description: Experience renamed as work_history.
  - output_name: academic_history
    path: education
    type: array
    missing: 'null'
    description: Education renamed as academic_history.
  - output_name: record_confidence
    path: overall_confidence
    type: number
    missing: 'null'
    normalization: round_2_decimal
    description: Overall confidence renamed for client schema.
options:
  include_provenance: true
  include_confidence: true
  missing_default: 'null'
  validation_mode: strict
  additional_output_properties: false
